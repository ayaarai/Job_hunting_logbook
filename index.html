// ══════════════════════════════════════════════════════════════════
// LocalStorage フック
// ══════════════════════════════════════════════════════════════════
function useLogs() {
  const [logs, setLogs] = useState(() => {
    try { const s = localStorage.getItem("job_logs_v3"); return s ? JSON.parse(s) : INIT; }
    catch { return INIT; }
  });
  useEffect(() => { localStorage.setItem("job_logs_v3", JSON.stringify(logs)); }, [logs]);

  const addLog = (data) => {
    const id = Date.now().toString();
    const initEvent = data.applicationDate
      ? [{ id:`${id}_e0`, date:data.applicationDate, type:"応募", memo:data.applicationMemo||"" }]
      : [];
    const log = { ...data, id, events:initEvent, createdAt:new Date().toISOString() };
    delete log.applicationDate; delete log.applicationMemo;
    setLogs(p => [log, ...p]);
  };

  const updateLog = (id, data) => setLogs(p => p.map(l => l.id===id ? {...l,...data} : l));
  const deleteLog = (id) => setLogs(p => p.filter(l => l.id!==id));

  const addEvent = (logId, ev) => {
    const evId = Date.now().toString();
    setLogs(p => p.map(l => {
      if (l.id !== logId) return l;
      const newEv = { ...ev, id:evId };
      const sorted = [...(l.events||[]), newEv].sort((a,b)=>a.date.localeCompare(b.date));
      const newStage = STAGES.includes(ev.type) ? ev.type : l.stage;
      const extra = ev.type==="お見送り" ? { dismissalReason:ev.dismissalReason||"", dismissalNote:ev.memo||"" } : {};
      return { ...l, events:sorted, stage:newStage, ...extra };
    }));
  };

  const deleteEvent = (logId, evId) =>
    setLogs(p => p.map(l => l.id!==logId ? l : { ...l, events:l.events.filter(e=>e.id!==evId) }));

  return { logs, addLog, updateLog, deleteLog, addEvent, deleteEvent };
}

function Ic({ n, size=16, cls="" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
         strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"

// ══════════════════════════════════════════════════════════════════
// 共通コンポーネント
// ══════════════════════════════════════════════════════════════════
function StageBadge({ stage }) {
  const c = cfgOf(stage);
  return (
    <span className={`inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full whitespace-nowrap ${c.bg} ${c.text}`}>
      <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${c.dot}`} />
      {stage}
    </span>
  );
}

function FormField({ label, required, error, hint, children }) {
  return (
    <div>
      <label className="block text-xs font-bold text-gray-400 mb-1.5 uppercase tracking-wider">
        {label}{required && <span className="text-red-400 ml-1">*</span>}
      </label>
      {children}
      {hint  && <p className="mt-1 text-xs text-gray-400">{hint}</p>}
      {error && <p className="mt-1.5 text-xs text-red-500 flex items-center gap-1"><Ic n="AlertCircle" size={12}/>{error}</p>}
    </div>
  );
}

function inCls(err) {
  return `w-full bg-gray-50 border ${err?"border-red-300 focus:ring-red-400":"border-gray-200 focus:ring-blue-500"} rounded-lg px-3.5 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:border-transparent transition-all`;
}

function routeLabel(log) {
  if (log.route==="エージェント" && log.agent) return `${log.route} · ${log.agent}`;
  if (log.route==="その他"       && log.media) return `その他 (${log.media})`;
  return log.route;
}

// ══════════════════════════════════════════════════════════════════
// 一覧画面
// ══════════════════════════════════════════════════════════════════
function ListScreen({ logs, onAdd, onDetail }) {
  const [search,      setSearch]      = useState("");
  const [filterStage, setFilterStage] = useState("すべて");

  const filtered = logs.filter(l => {
    const q = search.toLowerCase();
    const ms = !q || [l.company, l.stage, l.route, l.agent, l.media].some(v => v && v.toLowerCase().includes(q));
    const mf = filterStage==="すべて" || l.stage===filterStage;
    return ms && mf;
  });

  const stats = [
    { label:"応募中",   count:logs.filter(l=>!["内定","お見送り"].includes(l.stage)).length, color:"text-blue-600",    bg:"bg-blue-50 border-blue-100"    },
    { label:"内定",     count:logs.filter(l=>l.stage==="内定").length,                        color:"text-emerald-600", bg:"bg-emerald-50 border-emerald-100" },
    { label:"お見送り", count:logs.filter(l=>l.stage==="お見送り").length,                    color:"text-red-500",     bg:"bg-red-50 border-red-100"          },
  ];

  return (
    <div className="flex flex-col min-h-screen">
      {/* ヘッダー */}
      <header className="sticky top-0 z-20 bg-blue-600 shadow-lg">
        <div className="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
          <div className="flex items-center gap-2.5">
            <div className="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center flex-shrink-0">
              <Ic n="FileText" size={18} cls="text-white" />
            </div>
            <h1 className="text-white font-bold text-lg tracking-tight">企業選考ログ</h1>
          </div>
          <button onClick={onAdd}
            className="btn-blue flex-shrink-0 flex items-center gap-1.5 bg-white text-blue-600 font-bold text-sm px-4 py-2 rounded-lg shadow hover:bg-blue-50">
            <Ic n="Plus" size={15}/> 新規追加
          </button>
        </div>
      </header>

      <div className="max-w-2xl mx-auto w-full px-4 pt-5">
        {/* 統計カード */}
        <div className="grid grid-cols-3 gap-3 mb-4">
          {stats.map(s=>(
            <div key={s.label} className={`border rounded-xl p-3 text-center ${s.bg}`}>
              <div className={`text-2xl font-bold ${s.color}`}>{s.count}</div>
              <div className="text-xs text-gray-500 font-medium mt-0.5">{s.label}</div>
            </div>
          ))}
        </div>

        {/* 検索 */}
        <div className="relative mb-3">
          <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
            <Ic n="Search" size={16}/>
          </span>
          <input type="text" placeholder="企業名・フェーズ・経路で検索..."
            value={search} onChange={e=>setSearch(e.target.value)}
            className="w-full pl-10 pr-10 py-2.5 bg-white border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm"/>
          {search && (
            <button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <Ic n="X" size={16}/>
            </button>
          )}
        </div>

        {/* フェーズフィルター */}
        <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
          {["すべて",...STAGES].map(s=>(
            <button key={s} onClick={()=>setFilterStage(s)}
              className={`flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full border transition-all ${
                filterStage===s ? "bg-blue-600 text-white border-blue-600" : "bg-white text-gray-500 border-gray-200 hover:border-gray-300"
              }`}>{s}</button>
          ))}
        </div>
        <p className="text-xs text-gray-400 font-medium mt-2 mb-3">{filtered.length}件</p>
      </div>

      {/* カードリスト */}
      <div className="max-w-2xl mx-auto w-full px-4 pb-12 space-y-3">
        {filtered.length===0 ? (
          <div className="text-center py-20">
            <div className="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
              <Ic n="Building" size={30} cls="text-gray-300"/>
            </div>
            <p className="text-gray-400 text-sm">{search||filterStage!=="すべて" ? "該当する記録がありません" : "まだ記録がありません"}</p>
            {!search && filterStage==="すべて" && (
              <button onClick={onAdd} className="mt-3 text-blue-600 text-sm font-semibold hover:underline">最初の企業を追加する →</button>
            )}
          </div>
        ) : filtered.map(log=>(
          <button key={log.id} onClick={()=>onDetail(log)}
            className="fade-in log-card w-full bg-white rounded-xl border border-gray-100 p-4 text-left shadow-sm cursor-pointer">
            {/* 企業名 + バッジ */}
            <div className="flex items-start justify-between gap-3 mb-3">
              <h2 className="font-bold text-gray-900 text-base leading-snug flex-1 min-w-0 break-words">{log.company}</h2>
              <StageBadge stage={log.stage}/>
            </div>

            {/* メタ情報 */}
            <div className="flex flex-wrap gap-x-4 gap-y-1.5 text-xs text-gray-500">
              {log.interviewDate && (
                <span className="flex items-center gap-1.5"><Ic n="Calendar" size={13} cls="text-gray-400"/>{log.interviewDate}</span>
              )}
              <span className="flex items-center gap-1.5"><Ic n="Link" size={13} cls="text-gray-400"/>{routeLabel(log)}</span>
              {log.interviewer && (
                <span className="flex items-center gap-1.5"><Ic n="User" size={13} cls="text-gray-400"/>{log.interviewer}</span>
              )}
              {(log.events||[]).length>0 && (
                <span className="flex items-center gap-1.5"><Ic n="History" size={13} cls="text-gray-400"/>{log.events.length}件の記録</span>
              )}
            </div>

            {/* お見送り理由 */}
            {log.stage==="お見送り" && log.dismissalReason && (
              <div className="mt-2 flex items-center gap-1.5 text-xs text-red-500">
                <Ic n="XCircle" size={12}/>お見送り理由: {log.dismissalReason}
              </div>
            )}

            {/* メモ */}
            {log.memo && (
              <p className="mt-2.5 text-xs text-gray-400 leading-relaxed line-clamp-2 border-t border-gray-50 pt-2.5">{log.memo}</p>
            )}
          </button>
        ))}
      </div>
    </div>
  );
}

              <Ic n="Edit" size={17} cls="text-white"/>
            </button>
            <button onClick={onDelete} className="p-1.5 rounded-lg bg-white/15 hover:bg-red-400/40 transition-colors">
              <Ic n="Trash2" size={17} cls="text-white/80"/>
            </button>
          </div>
        </div>
      </header>

      <div className="max-w-2xl mx-auto w-full px-4 py-5 pb-12">

        {/* 企業サマリーカード */}
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-5">
          <div className="flex items-center justify-between mb-3 gap-3">
            <StageBadge stage={log.stage}/>
            {log.interviewDate && (
              <span className="flex items-center gap-1.5 text-xs text-gray-500">
                <Ic n="Calendar" size={13} cls="text-gray-400"/>次回: {log.interviewDate}
              </span>
            )}
          </div>
          {log.interviewer && (
            <div className="flex items-center gap-1.5 text-sm text-gray-600 mb-2">
              <Ic n="User" size={14} cls="text-gray-400"/>{log.interviewer}
            </div>
          )}
          {log.stage==="お見送り" && log.dismissalReason && (
            <div className="mt-1 p-2.5 bg-red-50 rounded-lg border border-red-100">
              <p className="text-xs font-bold text-red-600 mb-0.5">お見送り理由: {log.dismissalReason}</p>
              {log.dismissalNote && <p className="text-xs text-red-500 leading-relaxed">{log.dismissalNote}</p>}
            </div>
          )}
          {log.memo && <p className="text-xs text-gray-500 leading-relaxed mt-2">{log.memo}</p>}
        </div>

        {/* タイムラインヘッダー */}
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-bold text-gray-800 text-sm flex items-center gap-2">
            <Ic n="History" size={15} cls="text-blue-500"/>選考履歴タイムライン
          </h2>
          <button onClick={()=>setShowForm(v=>!v)}
            className="btn-blue flex items-center gap-1.5 bg-blue-600 text-white text-xs font-bold px-3.5 py-2 rounded-lg shadow-sm">
            <Ic n="Plus" size={13}/> 選考を記録
          </button>
        </div>

        {/* イベント追加フォーム */}
        {showForm && (
          <div className="slide-in mb-5">
            <EventForm
              onSave={ev => { onAddEvent(log.id, ev); setShowForm(false); }}
              onCancel={()=>setShowForm(false)}
            />
          </div>
        )}

        {/* タイムライン */}
        {events.length===0 ? (
          <div className="text-center py-10 text-gray-400 text-sm">
            <Ic n="History" size={28} cls="text-gray-200 mx-auto mb-2"/>
            まだ記録がありません。<br/>「選考を記録」から追加してください。
          </div>
        ) : (
          <div className="relative">
            {/* 縦線 */}
            <div className="absolute left-4 top-4 bottom-4 w-0.5 bg-gray-100" />

            <div className="space-y-0">
              {events.map((ev, idx) => {
                const c = cfgOf(ev.type);
                const isLast = idx === events.length - 1;
                return (
                  <div key={ev.id} className="relative flex gap-4 fade-in" style={{paddingBottom: isLast ? 0 : '1.5rem'}}>
                    {/* ドット */}
                    <div className="relative z-10 flex-shrink-0">
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center border-2 border-white shadow ${c.bg}`}>
                        <span className={`w-3 h-3 rounded-full ${c.dot}`}/>
                      </div>
                    </div>
                    {/* コンテンツ */}
                    <div className="flex-1 min-w-0 pt-1 pb-1">
                      <div className="flex flex-wrap items-center gap-2 mb-1.5">
                        <span className="text-xs font-bold text-gray-400">{ev.date}</span>
                        <StageBadge stage={ev.type}/>
                      </div>
                      {ev.type==="お見送り" && ev.dismissalReason && (
                        <p className="text-xs text-red-500 font-semibold mb-1">理由: {ev.dismissalReason}</p>
                      )}
                      {ev.memo && (
                        <div className="bg-white rounded-lg border border-gray-100 shadow-sm p-3">
                          <div className="flex items-start gap-1.5">
                            <Ic n="FileText" size={13} cls="text-gray-400 mt-0.5 flex-shrink-0"/>
                            <p className="text-xs text-gray-600 leading-relaxed">{ev.memo}</p>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// イベント追加フォーム（DetailScreen内インライン）
// ══════════════════════════════════════════════════════════════════
function EventForm({ onSave, onCancel }) {
  const todayStr = new Date().toISOString().split("T")[0];
  const [form, setForm] = useState({ date:todayStr, type:"一次面接", memo:"", dismissalReason:"" });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const isDismissal = form.type==="お見送り";

  return (
    <div className="bg-white rounded-xl border border-blue-100 shadow-md p-4 space-y-4">
      <p className="font-bold text-gray-800 text-sm flex items-center gap-2">
        <Ic n="Plus" size={15} cls="text-blue-500"/>選考を記録する
      </p>

      <div className="grid grid-cols-2 gap-3">
        <FormField label="日付">
          <input type="date" value={form.date} onChange={e=>set("date",e.target.value)} className={inCls()}/>
        </FormField>
        <FormField label="種別">
          <select value={form.type} onChange={e=>set("type",e.target.value)} className={inCls()}>
            {EVENT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </FormField>
      </div>

      {isDismissal && (
        <div className="fade-in">
          <FormField label="お見送り理由">
            <select value={form.dismissalReason} onChange={e=>set("dismissalReason",e.target.value)} className={inCls()}>
              <option value="">選択してください</option>
              {DISMISSAL_REASONS.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </FormField>
        </div>
      )}

      <FormField label="メモ">
        <textarea value={form.memo} onChange={e=>set("memo",e.target.value)}
          placeholder="面接の感触、気になった点など..."
          rows={3} className={inCls()+" resize-none"}/>
      </FormField>

      <div className="flex gap-2">
        <button onClick={onCancel}
          className="flex-1 py-2.5 rounded-lg border border-gray-200 text-sm text-gray-600 font-semibold hover:bg-gray-50 transition-colors">
          キャンセル
        </button>
        <button onClick={()=>{ if(form.date&&form.type) onSave(form); }}
          className="btn-blue flex-1 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-bold shadow-sm">
          記録する
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// 企業フォーム画面（新規追加 / 編集）
// ══════════════════════════════════════════════════════════════════
const EMPTY_FORM = {
  company:"", route:"直接応募", agent:"", media:"",
  stage:"書類選考中", dismissalReason:"", dismissalNote:"",
  interviewDate:"", interviewer:"", memo:"",
  applicationDate: new Date().toISOString().split("T")[0],
  applicationMemo:"",
};

function CompanyForm({ initial, onBack, onSave, onDelete }) {
  const isEdit = !!initial;
  const [form, setForm] = useState(() => initial ? {
    company:        initial.company||"",
    route:          initial.route||"直接応募",
    agent:          initial.agent||"",
    media:          initial.media||"",
    stage:          initial.stage||"書類選考中",
    dismissalReason:initial.dismissalReason||"",
    dismissalNote:  initial.dismissalNote||"",
    interviewDate:  initial.interviewDate||"",
    interviewer:    initial.interviewer||"",
    memo:           initial.memo||"",
    applicationDate:"", applicationMemo:"",
  } : {...EMPTY_FORM});
  const [errors, setErrors] = useState({});
  const [showDel, setShowDel] = useState(false);

  const set = (k,v) => { setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:undefined})); };
  const handleRoute = (v) => setForm(f=>({...f, route:v, agent:"", media:""}));
  const handleStage = (v) => setForm(f=>({...f, stage:v, dismissalReason:v!=="お見送り"?"":f.dismissalReason}));

  const validate = () => {
    const e={};
    if (!form.company.trim()) e.company="企業名は必須です";
    return e;
  };
  const handleSave = () => {
    const e=validate(); if(Object.keys(e).length){ setErrors(e); return; }
    onSave(form);
  };

  const showAgent     = form.route==="エージェント";
  const showMedia     = form.route==="その他";
  const showDismissal = form.stage==="お見送り";

  return (
    <div className="flex flex-col min-h-screen">
      {/* ヘッダー */}
      <header className="sticky top-0 z-20 bg-blue-600 shadow-lg">
        <div className="max-w-2xl mx-auto px-4 py-4 flex items-center gap-3">
          <button onClick={onBack} className="p-1.5 -ml-1 rounded-lg bg-white/15 hover:bg-white/25 transition-colors flex-shrink-0">
            <Ic n="ChevronLeft" size={20} cls="text-white"/>
          </button>
          <h1 className="flex-1 text-white font-bold text-lg">{isEdit ? "選考を編集" : "新規追加"}</h1>
          {isEdit && !showDel && (
            <button onClick={()=>setShowDel(true)} className="p-1.5 rounded-lg bg-white/15 hover:bg-red-400/40 transition-colors flex-shrink-0">
              <Ic n="Trash2" size={17} cls="text-white/80"/>
            </button>
          )}
        </div>
      </header>

      <div className="max-w-2xl mx-auto w-full px-4 py-5 space-y-4 pb-32">

        {/* 削除確認 */}
        {showDel && (
          <div className="fade-in bg-red-50 border border-red-200 rounded-xl p-4 flex items-center justify-between gap-3">
            <div>
              <p className="text-sm font-bold text-red-700">この記録を削除しますか？</p>
              <p className="text-xs text-red-500 mt-0.5">この操作は元に戻せません</p>
            </div>
            <div className="flex gap-2 flex-shrink-0">
              <button onClick={()=>setShowDel(false)} className="text-xs text-gray-600 px-3 py-1.5 rounded-lg bg-white border border-gray-200 hover:bg-gray-50 font-medium">キャンセル</button>
              <button onClick={onDelete} className="text-xs text-white bg-red-500 px-3 py-1.5 rounded-lg hover:bg-red-600 font-bold">削除する</button>
            </div>
          </div>
        )}

        {/* フォームカード */}
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 divide-y divide-gray-50 overflow-hidden">

          {/* 企業名 */}
          <div className="p-4">
            <FormField label="企業名" required error={errors.company}>
              <input type="text" value={form.company} onChange={e=>set("company",e.target.value)}
                placeholder="例）株式会社〇〇" className={inCls(errors.company)}/>
            </FormField>
          </div>

          {/* 応募経路 + エージェント名 / 媒体名 */}
          <div className="p-4 space-y-3">
            <FormField label="応募経路">
              <select value={form.route} onChange={e=>handleRoute(e.target.value)} className={inCls()}>
                {ROUTES.map(r=><option key={r} value={r}>{r}</option>)}
              </select>
            </FormField>
            {showAgent && (
              <div className="fade-in">
                <FormField label="エージェント名">
                  <input type="text" value={form.agent} onChange={e=>set("agent",e.target.value)}
                    placeholder="例）リクルートエージェント" className={inCls()}/>
                </FormField>
              </div>
            )}
            {showMedia && (
              <div className="fade-in">
                <FormField label="媒体名" hint="例: Wantedly / Green / ビズリーチ">
                  <input type="text" value={form.media} onChange={e=>set("media",e.target.value)}
                    placeholder="例）Wantedly" className={inCls()}/>
                </FormField>
              </div>
            )}
          </div>

          {/* 選考フェーズ */}
          <div className="p-4">
            <FormField label="現在のフェーズ">
              <div className="grid grid-cols-3 sm:grid-cols-4 gap-2 mt-1">
                {STAGES.map(s=>{
                  const c=cfgOf(s); const sel=form.stage===s;
                  return (
                    <button key={s} type="button" onClick={()=>handleStage(s)}
                      className={`py-2 px-1 rounded-lg text-xs font-bold border-2 transition-all leading-tight ${
                        sel ? `${c.btn} shadow-sm` : "bg-white text-gray-400 border-gray-100 hover:border-gray-200"
                      }`}>
                      {s}
                    </button>
                  );
                })}
              </div>
            </FormField>
          </div>

          {/* お見送り理由（お見送り選択時のみ） */}
          {showDismissal && (
            <div className="p-4 space-y-3 fade-in bg-red-50/40">
              <FormField label="お見送り理由">
                <select value={form.dismissalReason} onChange={e=>set("dismissalReason",e.target.value)} className={inCls()}>
                  <option value="">選択してください</option>
                  {DISMISSAL_REASONS.map(r=><option key={r} value={r}>{r}</option>)}
                </select>
              </FormField>
              <FormField label="自由記述">
                <textarea value={form.dismissalNote} onChange={e=>set("dismissalNote",e.target.value)}
                  placeholder="詳細や振り返りのメモ..."
                  rows={3} className={inCls()+" resize-none"}/>
              </FormField>
            </div>
          )}

          {/* 次回面接日 */}
          <div className="p-4">
            <FormField label="次回面接日">
              <input type="date" value={form.interviewDate} onChange={e=>set("interviewDate",e.target.value)} className={inCls()}/>
            </FormField>
          </div>

          {/* 面接官 */}
          <div className="p-4">
            <FormField label="面接官">
              <input type="text" value={form.interviewer} onChange={e=>set("interviewer",e.target.value)}
                placeholder="例）田中部長" className={inCls()}/>
            </FormField>
          </div>

          {/* 応募日（新規のみ） */}
          {!isEdit && (
            <div className="p-4">
              <FormField label="応募日">
                <input type="date" value={form.applicationDate} onChange={e=>set("applicationDate",e.target.value)} className={inCls()}/>
              </FormField>
            </div>
          )}

          {/* メモ */}
          <div className="p-4">
            <FormField label="メモ">
              <textarea value={form.memo} onChange={e=>set("memo",e.target.value)}
                placeholder="全体的な感触、準備事項など..."
                rows={4} className={inCls()+" resize-none"}/>
            </FormField>
          </div>
        </div>
      </div>

      {/* 保存ボタン */}
      <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-sm border-t border-gray-100 px-4 py-4 z-10">
        <div className="max-w-2xl mx-auto">
          <button onClick={handleSave}
            className="btn-blue w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold text-sm shadow-lg shadow-blue-200">
            {isEdit ? "変更を保存" : "追加する"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// App（ルーティング）
// ══════════════════════════════════════════════════════════════════
function App() {
  const { logs, addLog, updateLog, deleteLog, addEvent } = useLogs();
  const [screen,   setScreen]   = useState("list"); // list | detail | add | edit
  const [selected, setSelected] = useState(null);

  // logs 更新後も選択中ログを最新に保つ
  const selectedLog = selected ? (logs.find(l=>l.id===selected.id) || selected) : null;

  const goList   = () => { setScreen("list"); setSelected(null); };
  const goDetail = (log) => { setSelected(log); setScreen("detail"); };
  const goAdd    = () => setScreen("add");
  const goEdit   = () => setScreen("edit");

  if (screen==="add") {
    return (
      <CompanyForm
        onBack={goList}
        onSave={form => { addLog(form); goList(); }}
      />
    );
  }
  if (screen==="edit" && selectedLog) {
    return (
      <CompanyForm
        initial={selectedLog}
        onBack={()=>setScreen("detail")}
        onSave={form => { updateLog(selectedLog.id, form); setScreen("detail"); }}
        onDelete={() => { deleteLog(selectedLog.id); goList(); }}
      />
    );
  }
  if (screen==="detail" && selectedLog) {
    return (
      <DetailScreen
        log={selectedLog}
        onBack={goList}
        onEdit={goEdit}
        onAddEvent={addEvent}
        onDelete={() => { deleteLog(selectedLog.id); goList(); }}
      />
    );
  }
  return <ListScreen logs={logs} onAdd={goAdd} onDetail={goDetail}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
