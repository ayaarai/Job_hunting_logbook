<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>企業選考ログ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ─── Mock Data ────────────────────────────────────────────────────────────────
const INITIAL_LOGS = [
  {
    id: "1",
    company: "株式会社サンプル",
    route: "エージェント",
    agent: "リクルートエージェント",
    stage: "1次面接",
    interviewDate: "2026-03-10",
    interviewer: "田中部長",
    memo: "雰囲気は良かった。技術スタックの話が盛り上がった。",
    createdAt: "2026-03-01T10:00:00Z",
  },
  {
    id: "2",
    company: "テック株式会社",
    route: "LinkedIn",
    agent: "",
    stage: "カジュアル面談",
    interviewDate: "2026-03-15",
    interviewer: "佐藤CTO",
    memo: "スタートアップ。裁量が大きそう。",
    createdAt: "2026-03-05T09:00:00Z",
  },
  {
    id: "3",
    company: "フューチャー工業",
    route: "直接応募",
    agent: "",
    stage: "書類選考",
    interviewDate: "",
    interviewer: "",
    memo: "",
    createdAt: "2026-03-08T14:00:00Z",
  },
];

// ─── Mock API ─────────────────────────────────────────────────────────────────
function useLogs() {
  const [logs, setLogs] = useState(() => {
    try {
      const saved = localStorage.getItem("job_logs");
      return saved ? JSON.parse(saved) : INITIAL_LOGS;
    } catch {
      return INITIAL_LOGS;
    }
  });

  useEffect(() => {
    localStorage.setItem("job_logs", JSON.stringify(logs));
  }, [logs]);

  const addLog = (data) => {
    const newLog = { ...data, id: Date.now().toString(), createdAt: new Date().toISOString() };
    setLogs((prev) => [newLog, ...prev]);
    return newLog;
  };

  const updateLog = (id, data) => {
    setLogs((prev) => prev.map((l) => (l.id === id ? { ...l, ...data } : l)));
  };

  const deleteLog = (id) => {
    setLogs((prev) => prev.filter((l) => l.id !== id));
  };

  return { logs, addLog, updateLog, deleteLog };
}

// ─── Constants ────────────────────────────────────────────────────────────────
const ROUTES = ["エージェント", "直接応募", "LinkedIn", "リファラル", "その他"];
const STAGES = ["カジュアル面談", "書類選考", "1次面接", "2次面接", "最終面接", "内定"];

const STAGE_COLORS = {
  "カジュアル面談": "bg-purple-100 text-purple-700",
  "書類選考":       "bg-blue-100 text-blue-700",
  "1次面接":        "bg-cyan-100 text-cyan-700",
  "2次面接":        "bg-yellow-100 text-yellow-700",
  "最終面接":       "bg-orange-100 text-orange-700",
  "内定":           "bg-green-100 text-green-700",
};

// ─── Header ───────────────────────────────────────────────────────────────────
function Header({ title, onBack, onDelete }) {
  return (
    <header className="sticky top-0 z-10 bg-white border-b border-gray-100 px-4 py-3 flex items-center gap-3">
      {onBack && (
        <button onClick={onBack} className="p-1.5 -ml-1 rounded-lg hover:bg-gray-100 transition-colors">
          <svg className="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
          </svg>
        </button>
      )}
      <h1 className="flex-1 text-base font-semibold text-gray-900">{title}</h1>
      {onDelete && (
        <button onClick={onDelete} className="p-1.5 rounded-lg hover:bg-red-50 transition-colors">
          <svg className="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      )}
    </header>
  );
}

// ─── Badge ────────────────────────────────────────────────────────────────────
function StageBadge({ stage }) {
  return (
    <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${STAGE_COLORS[stage] || "bg-gray-100 text-gray-600"}`}>
      {stage}
    </span>
  );
}

// ─── List Screen ──────────────────────────────────────────────────────────────
function ListScreen({ logs, onAdd, onEdit }) {
  const [search, setSearch] = useState("");
  const filtered = logs.filter((l) =>
    l.company.toLowerCase().includes(search.toLowerCase()) ||
    l.stage.includes(search) ||
    l.route.includes(search)
  );

  return (
    <div className="flex flex-col min-h-screen">
      <Header title="企業選考ログ" />

      <div className="px-4 pt-4 pb-2">
        <div className="relative">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input
            type="text"
            placeholder="企業名・フェーズで検索..."
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            className="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
          />
        </div>
      </div>

      <div className="flex-1 px-4 pb-28 space-y-3 pt-2">
        {filtered.length === 0 ? (
          <div className="text-center py-16 text-gray-400 text-sm">
            {search ? "該当する記録がありません" : "まだ記録がありません"}
          </div>
        ) : (
          filtered.map((log) => (
            <button
              key={log.id}
              onClick={() => onEdit(log)}
              className="fade-in w-full bg-white rounded-2xl border border-gray-100 p-4 text-left shadow-sm hover:shadow-md hover:border-gray-200 transition-all"
            >
              <div className="flex items-start justify-between gap-2 mb-2">
                <h2 className="font-semibold text-gray-900 text-sm leading-tight">{log.company}</h2>
                <StageBadge stage={log.stage} />
              </div>

              <div className="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500">
                {log.interviewDate && (
                  <span className="flex items-center gap-1">
                    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    {log.interviewDate}
                  </span>
                )}
                <span className="flex items-center gap-1">
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                  </svg>
                  {log.route}{log.agent ? ` (${log.agent})` : ""}
                </span>
              </div>

              {log.memo && (
                <p className="mt-2 text-xs text-gray-400 leading-relaxed line-clamp-2">{log.memo}</p>
              )}
            </button>
          ))
        )}
      </div>

      <div className="fixed bottom-6 left-0 right-0 flex justify-center px-4 pointer-events-none">
        <button
          onClick={onAdd}
          className="pointer-events-auto flex items-center gap-2 bg-gray-900 text-white px-6 py-3.5 rounded-full shadow-lg hover:bg-gray-700 active:scale-95 transition-all text-sm font-medium"
        >
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4" />
          </svg>
          新規追加
        </button>
      </div>
    </div>
  );
}

// ─── Form Screen (Add / Edit) ─────────────────────────────────────────────────
const EMPTY_FORM = {
  company: "",
  route: "直接応募",
  agent: "",
  stage: "書類選考",
  interviewDate: "",
  interviewer: "",
  memo: "",
};

function FormScreen({ initial, onBack, onSave, onDelete }) {
  const isEdit = !!initial;
  const [form, setForm] = useState(initial ? {
    company: initial.company,
    route: initial.route,
    agent: initial.agent || "",
    stage: initial.stage,
    interviewDate: initial.interviewDate || "",
    interviewer: initial.interviewer || "",
    memo: initial.memo || "",
  } : EMPTY_FORM);
  const [errors, setErrors] = useState({});
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

  const set = (key, val) => {
    setForm((f) => ({ ...f, [key]: val }));
    setErrors((e) => ({ ...e, [key]: undefined }));
  };

  const validate = () => {
    const errs = {};
    if (!form.company.trim()) errs.company = "企業名は必須です";
    return errs;
  };

  const handleSave = () => {
    const errs = validate();
    if (Object.keys(errs).length > 0) { setErrors(errs); return; }
    onSave(form);
  };

  const handleDelete = () => {
    if (showDeleteConfirm) {
      onDelete();
    } else {
      setShowDeleteConfirm(true);
    }
  };

  return (
    <div className="flex flex-col min-h-screen">
      <Header
        title={isEdit ? "選考を編集" : "新規追加"}
        onBack={onBack}
        onDelete={isEdit ? handleDelete : undefined}
      />

      {showDeleteConfirm && (
        <div className="mx-4 mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700 flex items-center justify-between">
          <span>本当に削除しますか？</span>
          <div className="flex gap-2">
            <button onClick={() => setShowDeleteConfirm(false)} className="text-gray-500 px-2 py-1 hover:underline">キャンセル</button>
            <button onClick={onDelete} className="text-red-600 font-semibold px-2 py-1 hover:underline">削除する</button>
          </div>
        </div>
      )}

      <div className="flex-1 px-4 py-5 space-y-5 pb-32">
        {/* Company */}
        <Field label="企業名" required error={errors.company}>
          <input
            type="text"
            value={form.company}
            onChange={(e) => set("company", e.target.value)}
            placeholder="例）株式会社〇〇"
            className={inputCls(errors.company)}
          />
        </Field>

        {/* Route */}
        <Field label="応募経路">
          <select value={form.route} onChange={(e) => set("route", e.target.value)} className={inputCls()}>
            {ROUTES.map((r) => <option key={r}>{r}</option>)}
          </select>
        </Field>

        {/* Agent */}
        {form.route === "エージェント" && (
          <Field label="エージェント名">
            <input
              type="text"
              value={form.agent}
              onChange={(e) => set("agent", e.target.value)}
              placeholder="例）リクルートエージェント"
              className={inputCls()}
            />
          </Field>
        )}

        {/* Stage */}
        <Field label="選考フェーズ">
          <div className="grid grid-cols-3 gap-2">
            {STAGES.map((s) => (
              <button
                key={s}
                type="button"
                onClick={() => set("stage", s)}
                className={`py-2 px-1 rounded-xl text-xs font-medium border transition-all ${
                  form.stage === s
                    ? "bg-gray-900 text-white border-gray-900"
                    : "bg-white text-gray-600 border-gray-200 hover:border-gray-400"
                }`}
              >
                {s}
              </button>
            ))}
          </div>
        </Field>

        {/* Interview Date */}
        <Field label="面接日">
          <input
            type="date"
            value={form.interviewDate}
            onChange={(e) => set("interviewDate", e.target.value)}
            className={inputCls()}
          />
        </Field>

        {/* Interviewer */}
        <Field label="面接官">
          <input
            type="text"
            value={form.interviewer}
            onChange={(e) => set("interviewer", e.target.value)}
            placeholder="例）田中部長"
            className={inputCls()}
          />
        </Field>

        {/* Memo */}
        <Field label="メモ">
          <textarea
            value={form.memo}
            onChange={(e) => set("memo", e.target.value)}
            placeholder="面接の感触、準備事項、気になった点など..."
            rows={5}
            className={inputCls() + " resize-none"}
          />
        </Field>
      </div>

      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-4 py-4 safe-bottom">
        <button
          onClick={handleSave}
          className="w-full bg-gray-900 text-white py-3.5 rounded-xl font-medium text-sm hover:bg-gray-700 active:scale-[.98] transition-all"
        >
          {isEdit ? "変更を保存" : "追加する"}
        </button>
      </div>
    </div>
  );
}

function Field({ label, required, error, children }) {
  return (
    <div>
      <label className="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">
        {label}{required && <span className="text-red-400 ml-1">*</span>}
      </label>
      {children}
      {error && <p className="mt-1 text-xs text-red-500">{error}</p>}
    </div>
  );
}

function inputCls(error) {
  return `w-full bg-white border ${error ? "border-red-300 focus:ring-red-200" : "border-gray-200 focus:ring-gray-200"} rounded-xl px-3.5 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 transition-colors`;
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const { logs, addLog, updateLog, deleteLog } = useLogs();
  const [screen, setScreen] = useState("list"); // "list" | "add" | "edit"
  const [editing, setEditing] = useState(null);

  const goList = () => { setScreen("list"); setEditing(null); };
  const goAdd  = () => setScreen("add");
  const goEdit = (log) => { setEditing(log); setScreen("edit"); };

  const handleAdd = (form) => {
    addLog(form);
    goList();
  };

  const handleUpdate = (form) => {
    updateLog(editing.id, form);
    goList();
  };

  const handleDelete = () => {
    deleteLog(editing.id);
    goList();
  };

  if (screen === "add") {
    return <FormScreen onBack={goList} onSave={handleAdd} />;
  }
  if (screen === "edit") {
    return <FormScreen initial={editing} onBack={goList} onSave={handleUpdate} onDelete={handleDelete} />;
  }
  return <ListScreen logs={logs} onAdd={goAdd} onEdit={goEdit} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
